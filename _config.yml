remote_theme: just-the-docs/just-the-docs@v0.10.0

title: "AI Course for College Students"
description: "A hands-on AI course covering Generative AI, Prompt Engineering, Microsoft Copilot, and more — designed for college students across all disciplines."
url: "https://shaileshgnaik.github.io"
baseurl: "/ai-course-college-student.github.io"

author: "Shailesh G Naik"
github_username: Shaileshgnaik

# Just the Docs settings
color_scheme: default
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

aux_links:
  "GitHub Repo":
    - "https://github.com/Shaileshgnaik/ai-course-college-student.github.io"

aux_links_new_tab: true

nav_sort: case_insensitive

footer_content: "AI Course for College Students &copy; 2026 Shailesh G Naik &mdash; MIT License"

callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - "**/.gitkeep"
  - ".git"
  - "node_modules"
  - "vendor"
  - "Gemfile"
  - "Gemfile.lock"
