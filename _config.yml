theme: jekyll-theme-tactile

title: "AI Course for College Students"
description: "A hands-on AI course covering Generative AI, Prompt Engineering, Microsoft Copilot, and more — for college students across all disciplines."
url: "https://shaileshgnaik.github.io"
baseurl: "/ai-course-college-student.github.io"

author: "Shailesh G Naik"
github_username: Shaileshgnaik
github_repo: "ai-course-college-student.github.io"

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

include:
  - "*.md"
  - "_includes"
  - "_layouts"

exclude:
  - "**/.gitkeep"
  - ".git"
  - "node_modules"
  - "vendor"
  - "Gemfile"
  - "Gemfile.lock"
